services:
  db1:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Pcuong@2411"
      MSSQL_PID: "Developer"
      MSSQL_LCID: "1033"
      MSSQL_AGENT_ENABLED: true
    volumes:
      - db1_data:/var/opt/mssql
    ports:
      - "1434:1433"
    networks:
      - sqlnet

  db2:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Pcuong@2411"
      MSSQL_PID: "Developer"
      MSSQL_LCID: "1033"
      MSSQL_AGENT_ENABLED: true
    volumes:
      - db2_data:/var/opt/mssql
    ports:
      - "1435:1433"
    networks:
      - sqlnet

  db3:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Pcuong@2411"
      MSSQL_PID: "Developer"
      MSSQL_LCID: "1033"
      MSSQL_AGENT_ENABLED: true
    volumes:
      - db3_data:/var/opt/mssql
    ports:
      - "1436:1433"
    networks:
      - sqlnet

volumes:
  db1_data:
  db2_data:
  db3_data:

networks:
  sqlnet:
    driver: bridge